name: trendai_tunein
description: TrendAI Tune In — Live Audio Broadcaster
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  dio: ^5.8.0+1

  # QR scanning (to link server)
  mobile_scanner: ^5.2.3

  # Secure local storage
  flutter_secure_storage: ^9.2.4

  # Non-sensitive prefs (server URL)
  shared_preferences: ^2.3.3

  # Routing
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1

  # WebRTC for audio broadcasting
  flutter_webrtc: ^0.12.11

  # Socket.io for signaling
  socket_io_client: ^3.0.2

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
